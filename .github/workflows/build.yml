name: Build TryaskaFon APK

on:
  # Запуск при пуше в main
  push:
    branches: [ "main" ]
    # Запуск при создании тега версии (для релиза)
    tags:
      - 'v*'
  # Запуск при Pull Request
  pull_request:
    branches: [ "main" ]
  # Ручной запуск через GitHub UI
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. Чекаут кода
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Установка Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Кэшируем Gradle зависимости для ускорения сборки
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Даём права на запуск gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Сборка Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. Загружаем APK как артефакт сборки
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Запускаем только при пуше тега v*
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    permissions:
      contents: write

    steps:
      # 1. Чекаут
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Права
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Сборка Release APK (без подписи — debug-подпись)
      - name: Build Release APK
        run: ./gradlew assembleDebug --stacktrace

      # 6. Переименовываем APK с версией тега
      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/TryaskaFon-${VERSION}.apk
          echo "APK_PATH=app/build/outputs/apk/debug/TryaskaFon-${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # 7. Создаём GitHub Release и заливаем APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "ТряскаФон ${{ env.VERSION }}"
          body: |
            ## ТряскаФон ${{ env.VERSION }}
            
            ### Установка
            1. Скачать `TryaskaFon-${{ env.VERSION }}.apk`
            2. Разрешить установку из неизвестных источников
            3. Установить APK
            
            ### Что нового
            - Детектор тряски через акселерометр
            - Воспроизведение MP3 при тряске
            - Foreground Service (работает в фоне)
            - Настройка чувствительности
            - Вибрация при тряске
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
